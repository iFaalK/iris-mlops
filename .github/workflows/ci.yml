name: ML Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'pipelines/**'
      - 'k8s/**'
  workflow_dispatch:

jobs:
  build-and-compile:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install kfp==2.16.1 scikit-learn==1.6.1 pandas==2.0.3 numpy==1.24.3

    - name: Compile Kubeflow Pipeline
      run: |
        cd pipelines
        python pipeline.py
        
        ls -la | grep iris_pipeline.yaml

    - name: Trigger ArgoCD (Update timestamp)
      run: |
        sed -i "s/build-time: .*/build-time: \"$(date +'%Y%m%d%H%M%S')\"/" k8s/pipeline-run.yaml

    - name: Commit and push compiled pipeline
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add pipelines/iris_pipeline.yaml
        git add k8s/pipeline-run.yaml
        git commit -m "autocomp [skip ci]" || echo "Изменений нет"
        git push origin HEAD:master