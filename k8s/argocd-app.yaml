apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iris-mlops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/iFaalK/iris-mlops.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: kubeflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:                        # ← добавить это
  - group: argoproj.io
    kind: Workflow
    jsonPointers:
    - /metadata/name