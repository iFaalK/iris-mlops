name: ML Pipeline CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'pipelines/**'
  workflow_dispatch:

jobs:
  build-and-compile:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install kfp==2.16.1 scikit-learn==1.6.1 pandas==2.0.3 numpy==1.24.3

    - name: Compile Kubeflow Pipeline
      run: |
        cd pipelines
        python pipeline.py
        
        ls -la | grep iris_pipeline.yaml

    - name: Upload compiled pipeline
      uses: actions/upload-artifact@v4
      with:
        name: compiled-iris-pipeline
        path: pipelines/iris_pipeline.yaml
        retention-days: 7